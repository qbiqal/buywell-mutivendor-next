name: CI/CD — BuyWell Multivendor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Secret Reference ──────────────────────────────────────────────────────────
#
# UNIVERSAL secrets (set once in GitHub org/account — same value for ALL repos):
#   COOLIFY_TOKEN    → deploy-only token (30|...) — all-perms token in memory
#   COOLIFY_BASE_URL → http://178.104.149.128:8000
#
# PER-APP secrets (set per repo):
#   COOLIFY_APP_UUID → nn399lysa851mtmlqy2xz8t7
#   DEPLOY_SECRET    → set in Coolify env vars
#
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Type-check — runs on every push and PR; blocks deploy if it fails
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Type-check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy — only on push to main after test passes
  # Flow: trigger Coolify → startup.js runs migrations + config seed →
  #       poll /api/health → flush Redis cache
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Triggering Coolify deployment for BuyWell Multivendor..."
          HTTP_STATUS=$(curl -s -o /tmp/coolify_response.txt -w "%{http_code}" -X POST \
            "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/coolify_response.txt || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -gt 299 ]; then
            echo "Deploy webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Wait for App to be Healthy
        run: |
          echo "Polling Coolify for healthy status (up to 6 min)..."
          for i in $(seq 1 24); do
            echo "  Attempt $i/24 ($(date -u '+%H:%M:%S'))..."
            STATUS=$(curl -sf --max-time 10 \
              "${{ secrets.COOLIFY_BASE_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "error")
            echo "  Status: $STATUS"
            if echo "$STATUS" | grep -q "running:healthy"; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "App did not reach running:healthy after 6 minutes"
          exit 1

      - name: Flush Redis Cache
        run: |
          echo "Flushing query cache..."
          curl -sf --max-time 30 -X POST \
            "https://buywell.in/api/deploy-hook" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            && echo "Cache flushed." \
            || echo "Cache flush skipped — DNS not yet pointed to server (non-fatal)."
